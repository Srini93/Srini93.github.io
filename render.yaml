# Reference Render Blueprint: Srini chat API (FastAPI) under backend/
# Set GROQ_API_KEY in the Render dashboard (encrypted at rest) — do not paste keys into git.
# https://render.com/docs/blueprint-spec

services:
  - type: web
    name: srini-chat-api
    runtime: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn server:app -k uvicorn.workers.UvicornWorker -w $WEB_CONCURRENCY --bind 0.0.0.0:$PORT --timeout 120
    healthCheckPath: /health
    envVars:
      - key: PYTHON_VERSION
        value: "3.11.0"
      - key: WEB_CONCURRENCY
        value: "4"
      - key: GROQ_API_KEY
        sync: false
