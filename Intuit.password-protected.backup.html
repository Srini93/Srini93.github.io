<style>
  /* ── Logo ── */
  .logo-srini {
    position: absolute;
    z-index: 10001;
    font-family: 'Press Start 2P', 'Courier New', 'Monaco', monospace;
    font-size: 16px;
    color: #666;
    text-decoration: none;
    letter-spacing: 2px;
    cursor: pointer;
    text-transform: uppercase;
    line-height: 1.5;
    display: inline-block;
    padding-bottom: 4px;
    text-align: left;
  }
  .logo-srini::after { display: none; }

  @media screen and (min-width: 769px) {
    .logo-srini {
      top: 68px;
      transform: translateY(-50%);
      left: 4rem;
    }
  }
  @media screen and (max-width: 768px) {
    .logo-srini {
      font-size: 12px;
      top: 2rem;
      left: 2rem;
      letter-spacing: 1px;
      transform: none;
    }
  }

  /* ── Hamburger icon base (no style-3.css on this page) ── */
  .hamburgler-icon, .hamburgler-icon:before, .hamburgler-icon:after {
    content: '';
    position: absolute;
    border-radius: 1em;
    height: 2px;
    width: 24px;
    background: #000;
    transition: all 0.2s ease;
  }
  .hamburgler-icon        { top: 0.75em; }
  .hamburgler-icon:before { top: -0.55em; }
  .hamburgler-icon:after  { top: 0.55em; }

  /* ── Header (floats over the full-viewport password dialog) ── */
  header {
    background: transparent;
    display: flex;
    align-items: center;
    min-height: 65px;
    justify-content: flex-end;
    padding: 0 2rem 0 0;
    overflow: visible;
    position: fixed;
    top: 0;
    left: 0;
    right: 0;
    z-index: 10000;
  }
  header nav {
    display: flex;
    justify-content: flex-end;
    flex: 1;
  }

  /* ── Hamburger menu ── */
  @media screen and (min-width: 769px) {
    .hamburgler-icon-wrapper { display: none !important; }
    .hamburgler-menu { display: none !important; }
  }
  .hamburgler-icon-wrapper {
    z-index: 10000 !important;
    position: absolute !important;
    top: 2rem !important;
    right: 2rem !important;
    height: 26px !important;
    width: 26px !important;
    cursor: pointer !important;
  }
  .hamburgler-icon, .hamburgler-icon:before, .hamburgler-icon:after {
    background: #000 !important;
  }
  .hamburgler-active .hamburgler-icon {
    background: transparent !important;
    transform: rotate(-135deg) !important;
  }
  .hamburgler-active .hamburgler-icon:before,
  .hamburgler-active .hamburgler-icon:after {
    top: 0 !important;
    background: black !important;
  }
  .hamburgler-active .hamburgler-icon:before {
    transform: rotate(90deg) !important;
  }

  .hamburgler-menu {
    opacity: 0 !important;
    pointer-events: none !important;
    position: fixed !important;
    top: 12px !important;
    right: 12px !important;
    bottom: auto !important;
    left: 12px !important;
    width: auto !important;
    background-color: #fbfaf4 !important;
    color: #000 !important;
    text-align: center !important;
    border-radius: 20px !important;
    padding: 5rem 2rem 2.5rem !important;
    box-shadow: 0 8px 40px rgba(0,0,0,0.12), 0 0 0 1px rgba(0,0,0,0.04) !important;
    z-index: 9998 !important;
    transform: translateY(-12px) scale(0.98) !important;
    transition: opacity 0.3s cubic-bezier(0.16, 1, 0.3, 1),
                transform 0.3s cubic-bezier(0.16, 1, 0.3, 1) !important;
  }
  .hamburgler-active .hamburgler-menu {
    opacity: 1 !important;
    pointer-events: initial !important;
    transform: translateY(0) scale(1) !important;
    z-index: 9998 !important;
  }
  .hamburgler-active {
    overflow: visible !important;
    max-height: none !important;
  }

  .hamburgler-menu-list {
    display: flex !important;
    flex-direction: column !important;
    gap: 0.25rem !important;
    float: none !important;
    text-align: center !important;
    padding: 0 !important;
    margin: 0 !important;
    list-style-type: none !important;
    position: static !important;
    transform: none !important;
    font-size: 110% !important;
    overflow: visible !important;
  }
  .hamburgler-active .hamburgler-menu-list {
    transform: none !important;
  }
  .hamburgler-menu-list li {
    line-height: 1.4 !important;
    float: none !important;
    display: block !important;
    margin: 0 !important;
    text-align: center !important;
  }
  .hamburgler-menu-list li a:not(.get-in-touch-btn) {
    display: block !important;
    padding: 0.85rem 1rem !important;
    border-radius: 12px !important;
    color: #000 !important;
    text-decoration: none !important;
    transition: background 0.2s ease !important;
  }
  .hamburgler-menu-list li a:not(.get-in-touch-btn):hover {
    background: rgba(0,0,0,0.05) !important;
  }

  .hamburgler-backdrop {
    position: fixed; inset: 0; z-index: 9997;
    background: rgba(0,0,0,0); pointer-events: none;
    transition: background 0.3s ease;
  }
  .hamburgler-backdrop.active {
    background: rgba(0,0,0,0.15); pointer-events: auto;
  }

  /* ── Desktop menu ── */
  .desk-menu {
    display: flex !important;
    align-items: center !important;
    justify-content: flex-end !important;
    height: 100%;
    padding-top: 40px !important;
    padding-right: 1rem !important;
    overflow: visible !important;
  }
  .desk-menu li {
    display: flex !important;
    align-items: center !important;
    float: none !important;
    height: 100%;
  }
  .desk-menu li a:not(.get-in-touch-btn) {
    display: flex !important;
    align-items: center !important;
    height: 100%;
    padding: 0 25px !important;
    font-family: 'Space Mono', 'Courier New', 'Monaco', monospace !important;
    font-size: 14px !important;
    letter-spacing: 0.5px !important;
    text-transform: uppercase !important;
    color: #000 !important;
    text-decoration: none;
  }
  .desk-menu li a:not(.get-in-touch-btn):hover,
  .desk-menu li a:not(.get-in-touch-btn):focus-visible {
    text-decoration: underline;
    text-underline-offset: 0.2em;
  }

  /* Hamburger menu links */
  .hamburgler-menu-list li a {
    font-family: 'Space Mono', 'Courier New', 'Monaco', monospace !important;
    font-size: 16px !important;
    letter-spacing: 0.5px !important;
    text-transform: uppercase !important;
  }

  /* ── Get in Touch button (glassmorphism) ── */
  .get-in-touch-btn {
    position: relative;
    display: inline-flex !important;
    align-items: center !important;
    justify-content: center !important;
    gap: 8px;
    padding: 14px 28px !important;
    min-height: auto !important;
    min-width: auto !important;
    background: rgba(255, 255, 255, 0.1) !important;
    backdrop-filter: blur(24px) !important;
    -webkit-backdrop-filter: blur(24px) !important;
    border: 1px solid rgba(255, 255, 255, 0.3) !important;
    box-shadow:
      0 4px 16px rgba(0, 0, 0, 0.08),
      inset 0 1px 0 0 rgba(255, 255, 255, 0.4),
      0 0 0 1px rgba(255, 255, 255, 0.1) !important;
    color: #000 !important;
    border-radius: 9999px !important;
    font-size: 13px !important;
    font-weight: 400 !important;
    font-family: 'Space Mono', 'Courier New', 'Monaco', monospace !important;
    text-decoration: none !important;
    transition: all 0.3s ease !important;
    cursor: pointer !important;
    line-height: 1 !important;
    letter-spacing: 0.5px !important;
    text-transform: uppercase !important;
    margin-left: 8px !important;
    vertical-align: middle !important;
    overflow: hidden;
  }
  .get-in-touch-btn::before {
    content: '';
    position: absolute; inset: 0; z-index: 0;
    background: rgba(255, 255, 255, 0.05);
    transform: translateX(-100%);
    transition: transform 0.3s ease-out;
  }
  .get-in-touch-btn:hover::before { transform: translateX(0); }
  .get-in-touch-btn:hover {
    border-color: rgba(255, 255, 255, 0.5) !important;
    transform: scale(1.03) !important;
    box-shadow:
      0 12px 32px rgba(0, 0, 0, 0.15),
      inset 0 1px 0 0 rgba(255, 255, 255, 0.5),
      0 0 0 1px rgba(255, 255, 255, 0.2) !important;
  }
  .get-in-touch-btn:active { transform: scale(0.98) !important; }

  .hamburgler-menu-list .get-in-touch-btn {
    display: flex !important;
    align-items: center !important;
    justify-content: center !important;
    margin: 1.25rem auto 0 !important;
    padding: 16px 32px !important;
    width: 100%;
    max-width: 280px;
    min-height: 56px;
    background: #000 !important;
    color: #fff !important;
    border: none !important;
    border-radius: 9999px !important;
    font-size: 14px !important;
    font-weight: 200 !important;
    letter-spacing: 0.5px !important;

    backdrop-filter: none !important;
    -webkit-backdrop-filter: none !important;
    transition: transform 0.2s ease, box-shadow 0.2s ease !important;
  }
  .hamburgler-menu-list .get-in-touch-btn:hover {
    transform: scale(1.03) !important;
    box-shadow: 0 6px 20px rgba(0,0,0,0.2) !important;
    background: #222 !important;
    color: #fff !important;
  }
  .hamburgler-menu-list .get-in-touch-btn:active {
    transform: scale(0.98) !important;
  }

  /* ── Responsive: hide desktop menu, show hamburger ── */
  @media screen and (max-width: 768px) {
    .desk-menu { display: none !important; }

    ul.hamburgler-menu-list { display: flex !important; flex-direction: column !important; overflow: visible !important; }
    .hamburgler-menu-list li { display: block !important; float: none !important; }
    header { padding-bottom: 0 !important; }

  }
  @media screen and (max-width: 601px) {
    .desk-menu { display: none !important; }

    .hamburgler-menu { display: block !important; opacity: 0; }

    .hamburgler-menu-list li { display: block !important; float: none !important; }
    header { padding-bottom: 0 !important; }

  /* AI chat sparkle (matches index.html / API.html) */
  .srini-chat-nav-li { display: flex; align-items: center; flex-shrink: 0; overflow: visible; z-index: 2; }
  .srini-chat-hovertip {
    position: absolute;
    top: calc(100% + 10px);
    left: 50%;
    transform: translateX(-50%) translateY(6px);
    padding: 8px 14px;
    background: #000;
    color: #fff;
    font-family: 'Space Mono', 'Courier New', Monaco, monospace;
    font-size: 11px;
    font-weight: 500;
    letter-spacing: 0.03em;
    white-space: nowrap;
    border-radius: 999px;
    box-shadow: 0 8px 28px rgba(0, 0, 0, 0.22);
    opacity: 0;
    visibility: hidden;
    pointer-events: none;
    transition: opacity 0.2s ease, transform 0.2s ease, visibility 0.2s;
    z-index: 10005;
  }
  .srini-chat-hovertip::after {
    content: '';
    position: absolute;
    bottom: 100%;
    left: 50%;
    margin-left: -6px;
    border: 6px solid transparent;
    border-bottom-color: #000;
  }
  .srini-chat-nav-btn:hover .srini-chat-hovertip,
  .srini-chat-nav-btn:focus-visible .srini-chat-hovertip {
    opacity: 1 !important;
    visibility: visible !important;
    transform: translateX(-50%) translateY(0) !important;
  }
  .srini-chat-nav-btn {
    background: #eaeefb;
    border: 1px solid rgba(255,255,255,0.5);
    padding: 0;
    width: 48px;
    height: 48px;
    min-width: 48px;
    min-height: 48px;
    flex-shrink: 0;
    border-radius: 50%;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: background 0.2s;
    box-sizing: border-box;
    position: relative;
  }
  .srini-chat-sparkle { width: 26px; height: 26px; flex-shrink: 0; color: #3b65ef; transition: transform 0.2s ease, color 0.2s ease; }
  .srini-chat-nav-btn:hover { background: #dce3f8; }
  .srini-chat-nav-btn:hover .srini-chat-sparkle { transform: scale(1.15); color: #3b65ef; }
  @media (max-width: 768px) {
    .srini-chat-hovertip,
    .srini-chat-nav-btn:hover .srini-chat-hovertip,
    .srini-chat-nav-btn:focus-visible .srini-chat-hovertip {
      display: none !important;
      opacity: 0 !important;
      visibility: hidden !important;
    }
    .srini-chat-nav-li { display: none !important; }
  }
</style>

<script>
  $(function(){
    try { if (typeof AOS !== 'undefined') AOS.init({ duration: 1200 }); } catch(e) {}

    // Hamburger Menu and Esc events
    $('#hamburgler').on('click', checkNav);
    $('.hamburgler-menu').on('click', 'a', closeNav);
    $(window).on('keyup', ifEscClose);
    $(document).on('click', '.hamburgler-backdrop', closeNav);

    function checkNav() {
      var isOpen = $('body').hasClass('hamburgler-active');
      $('body').toggleClass('hamburgler-active');
      if (!isOpen) {
        if (!$('.hamburgler-backdrop').length) {
          $('<div class="hamburgler-backdrop"></div>').appendTo('body');
        }
        $('.hamburgler-backdrop').addClass('active');
      } else {
        $('.hamburgler-backdrop').removeClass('active');
      }
    }
    function closeNav(e) {
      $('body').removeClass('hamburgler-active');
      $('.hamburgler-backdrop').removeClass('active');
    }
    function ifEscClose(e) { if (e.keyCode == 27) closeNav() }
  });
